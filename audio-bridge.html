<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Bridge</title>
<base target="_blank">
</head>
<body>
    <audio id="bg-music" loop>
        <source src="song.mp3.mp3" type="audio/mp3">
    </audio>

    <script>
        const audio = document.getElementById('bg-music');

        window.addEventListener('message', function(e) {
            if (e.data.action === 'play') {
                audio.volume = e.data.volume || 0.5;
                audio.play().then(() => {
                    parent.postMessage({ action: 'playing', currentTime: audio.currentTime }, '*');
                }).catch(err => {
                    parent.postMessage({ action: 'play-blocked' }, '*');
                });
            }
            else if (e.data.action === 'pause') {
                audio.pause();
            }
            else if (e.data.action === 'setVolume') {
                audio.volume = e.data.volume;
            }
            else if (e.data.action === 'getStatus') {
                parent.postMessage({ 
                    action: 'status', 
                    isPlaying: !audio.paused,
                    currentTime: audio.currentTime,
                    volume: audio.volume
                }, '*');
            }
        });

        window.parent.postMessage({ action: 'bridge-ready' }, '*');
    </script>
</body>
</html>
